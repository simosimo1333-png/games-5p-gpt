services:
  - type: web
    name: games-5p-gpt-server
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./apps/server/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeployTrigger: checksPass
    maxShutdownDelaySeconds: 30
    envVars:
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGINS
        sync: false
      - key: FRIEND_ACCESS_KEY
        sync: false
