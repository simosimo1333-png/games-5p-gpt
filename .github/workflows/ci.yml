name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run quality checks
        run: npm run check

  e2e:
    name: Mobile smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install mobile browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Build client
        run: npm run build:client

      - name: Run mobile smoke test
        run: npm run test:e2e

  server-image:
    name: Server container
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build production server image
        run: docker build --file apps/server/Dockerfile --tag houkago-server:test .

      - name: Verify container health
        run: |
          docker run --detach --name houkago-server --publish 8787:8787 --env ALLOWED_ORIGINS=https://game.example houkago-server:test
          for attempt in {1..20}; do
            if curl --fail --silent http://127.0.0.1:8787/health; then exit 0; fi
            sleep 1
          done
          docker logs houkago-server
          exit 1
