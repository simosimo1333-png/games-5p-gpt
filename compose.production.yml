services:
  game-server:
    image: ${SERVER_IMAGE:-ghcr.io/simosimo1333-png/games-5p-gpt-server:latest}
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    init: true
    environment:
      PORT: 8787
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?ALLOWED_ORIGINSを設定してください}
    ports:
      - "${SERVER_PORT:-8787}:8787"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8787/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
